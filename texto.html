<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atalhos Invertidos — Impressão A4</title>
<style>
  /* ─── TELA (editor) ─── */
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d14;
    --surface: #14141e;
    --border: #252535;
    --accent: #00e5ff;
    --accent2: #ff3cac;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 55% 35% at 15% 15%, rgba(0,229,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 85% 85%, rgba(255,60,172,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .editor-wrapper {
    width: 100%;
    max-width: 860px;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.2rem;
  }

  .sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 1.8rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .field-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    padding: 0.9rem 1rem;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.7;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.07);
  }

  .options-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 1rem;
  }

  .opt-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 0.25rem;
  }

  select, input[type=number] {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 0.4rem 0.7rem;
    outline: none;
    cursor: pointer;
  }

  select:focus, input[type=number]:focus { border-color: var(--accent); }

  input[type=number] { width: 70px; }

  .toggle-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-print {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 2rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #0097a7);
    color: #000;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn-print:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,229,255,0.3);
  }

  /* ─── PREVIEW ─── */
  .preview-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  /* Simula A4 proporcional na tela */
  .a4-preview {
    background: #fff;
    color: #000;
    width: 100%;
    max-width: 794px;
    /* A4: 210mm × 297mm ≈ proporção 1:1.414 */
    aspect-ratio: 210 / 297;
    margin: 0 auto;
    border-radius: 4px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
  }

  .a4-inner {
    position: absolute;
    inset: 0;
    padding: 1cm; /* borda máxima 1cm */
    display: flex;
    flex-direction: column;
  }

  .a4-columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0 0.5cm;
    flex: 1;
    overflow: hidden;
    align-content: start;
  }

  .a4-line {
    display: block;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 9pt;
    font-weight: bold;
    color: #000;
    line-height: 1.35;
    white-space: pre;
    overflow: hidden;
    text-overflow: clip;
  }

  .a4-line.inverted {
    display: inline-block;
    transform: scaleX(-1);
    transform-origin: left center;
    width: 100%;
  }

  /* ─── PRINT ─── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body, html {
      background: #fff !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    .editor-wrapper > *:not(.print-only) { display: none !important; }
    .print-only { display: block !important; }

    @page {
      size: A4 portrait;
      margin: 0.8cm;
    }

    .print-sheet {
      width: 100%;
      height: 100%;
    }

    .print-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0 0.5cm;
      align-content: start;
    }

    .print-line {
      display: block;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9pt;
      font-weight: bold;
      color: #000;
      line-height: 1.35;
      white-space: pre;
      overflow: hidden;
    }

    .print-line.inverted {
      display: inline-block;
      transform: scaleX(-1);
      transform-origin: left center;
      width: 100%;
    }
  }
</style>
</head>
<body>

<div class="editor-wrapper">
  <h1>Atalhos → Impressão A4</h1>
  <p class="sub">// 3 colunas · Arial 9pt · bold · margem ≤ 1cm · espelhamento por linha</p>

  <div class="card">
    <div class="field-label">✏️ Cole ou digite seus atalhos (uma linha por atalho)</div>
    <textarea id="input" oninput="renderPreview()" placeholder="Ctrl + C          Copiar
Ctrl + X          Recortar
Ctrl + V          Colar
Ctrl + Z          Desfazer
Ctrl + A          Selecionar tudo
Ctrl + S          Salvar
Ctrl + P          Imprimir
Ctrl + F          Localizar
Ctrl + N          Novo
Ctrl + W          Fechar aba
Alt + F4          Fechar janela
Win + D           Mostrar área de trabalho
Win + L           Bloquear tela
Win + E           Explorador de arquivos
Ctrl + Shift + T  Reabrir aba
Ctrl + Tab        Próxima aba
F2                Renomear
F5                Atualizar
Delete            Excluir
Shift + Delete    Excluir permanente"></textarea>

    <div class="options-row">
      <span class="opt-label">Modo:</span>
      <button class="toggle-btn active" id="btn-invertido" onclick="setModo('invertido')">⟺ Invertido</button>
      <button class="toggle-btn" id="btn-normal" onclick="setModo('normal')">Normal</button>
    </div>

    <div class="options-row" style="margin-top:1.2rem">
      <button class="btn-print" onclick="imprimir()">🖨️ Imprimir</button>
    </div>
  </div>

  <div class="card">
    <div class="preview-title">👁 Pré-visualização A4 (3 colunas)</div>
    <div class="a4-preview">
      <div class="a4-inner">
        <div class="a4-columns" id="preview-columns"></div>
      </div>
    </div>
  </div>

  <!-- Conteúdo apenas para impressão -->
  <div class="print-only" style="display:none">
    <div class="print-sheet">
      <div class="print-columns" id="print-columns"></div>
    </div>
  </div>
</div>

<script>
  let modo = 'invertido';

  function setModo(m) {
    modo = m;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + m).classList.add('active');
    renderPreview();
  }

  function getLinhas() {
    return document.getElementById('input').value
      .split('\n')
      .map(l => l); // mantém espaços originais para preservar alinhamento
  }

  function renderPreview() {
    const linhas = getLinhas();
    const preview = document.getElementById('preview-columns');
    const printDiv = document.getElementById('print-columns');

    let previewHTML = '';
    let printHTML = '';

    linhas.forEach(linha => {
      const cls = modo === 'invertido' ? 'inverted' : '';
      previewHTML += `<span class="a4-line ${cls}">${escHtml(linha) || '&nbsp;'}</span>`;
      printHTML  += `<span class="print-line ${cls}">${escHtml(linha) || '&nbsp;'}</span>`;
    });

    preview.innerHTML = previewHTML;
    printDiv.innerHTML = printHTML;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function imprimir() {
    window.print();
  }

  renderPreview();
</script>
</body>
</html>
